<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Camera body -->
  <rect x="50" y="60" width="100" height="80" rx="8" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  
  <!-- Camera lens (main circle) -->
  <circle cx="100" cy="100" r="28" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  
  <!-- Lens inner circle -->
  <circle cx="100" cy="100" r="22" fill="#3b82f6" opacity="0.1"/>
  
  <!-- Lens aperture -->
  <circle cx="100" cy="100" r="16" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  
  <!-- Flash -->
  <rect x="60" y="70" width="12" height="12" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  
  <!-- Viewfinder -->
  <rect x="125" y="70" width="12" height="12" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  
  <!-- Shutter button -->
  <circle cx="145" cy="75" r="4" fill="#3b82f6"/>
  
  <!-- Bottom panel -->
  <rect x="55" y="145" width="90" height="8" rx="2" fill="#e0f2fe"/>
  
  <!-- Text: MediaHub -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1e40af">MediaHub</text>
</svg>
